name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check src/ scripts/

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,docs]"

      - name: Generate pydantic models
        run: |
          mkdir -p src/generated
          gen-pydantic model/cesm.yaml > src/generated/cesm_pydantic.py
          touch src/generated/__init__.py

      - name: Run tests
        run: pytest tests/ -v

  validate-schema:
    name: Validate LinkML schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[docs]"

      - name: Validate schema
        run: python scripts/validation/validate_linkml_schema.py model/cesm.yaml
